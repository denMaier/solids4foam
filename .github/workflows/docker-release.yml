name: Docker release (manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "solids4foam release version (e.g. v2.3)"
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: "openfoam-v2412", file: ".docker/Dockerfile.openfoamv2412" }
          - { name: "openfoam-v2312", file: ".docker/Dockerfile.openfoamv2312" }
          - { name: "openfoam-9",     file: ".docker/Dockerfile.openfoam9" }
          - { name: "foam-extend-4.1",file: ".docker/Dockerfile.foamextend41" }

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.image.file }}
          push: true
          tags: |
            solids4foam/solids4foam:${{ inputs.version }}-${{ matrix.image.name }}
            solids4foam/solids4foam:${{ inputs.version }}-${{ matrix.image.name }}-latest
            solids4foam/solids4foam:${{ github.sha }}-${{ matrix.image.name }}